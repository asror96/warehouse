name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          cd /home/warehouse
          composer install --no-dev --optimize-autoloader

      - name: Restart services
        run: |
          docker compose down
          docker compose up -d --build
